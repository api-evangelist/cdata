aid: cdata
url: >-
  https://raw.githubusercontent.com/api-evangelist/cdata/refs/heads/main/apis.yml
apis:
  - aid: cdata:sql-api
    name: CData SQL API
    tags:
      - Data Access
      - Query
      - REST
      - SQL
    humanURL: https://cloud.cdata.com/docs/SQL-API.html
    properties:
      - url: https://cloud.cdata.com/docs/SQL-API.html
        type: Documentation
      - url: https://cloud.cdata.com/docs/API.html
        type: Overview
      - url: https://cloud.cdata.com/docs/Authentication.html
        type: Authentication
    description: >-
      The CData Cloud SQL API provides HTTP-based access to execute SQL
      queries, batch operations, and stored procedures across all data
      sources configured in a CData Connect Cloud account. Real-time data
      access across enterprise apps.
  - aid: cdata:metadata-api
    name: CData Metadata API
    tags:
      - Catalog
      - Data Access
      - Metadata
      - Schemas
    humanURL: https://cloud.cdata.com/docs/Metadata-API.html
    properties:
      - url: https://cloud.cdata.com/docs/Metadata-API.html
        type: Documentation
    description: >-
      The CData Cloud Metadata API exposes catalog information including
      schemas, tables, columns, keys, and stored procedures across every
      configured data source, enabling tools to introspect the connected
      sources before querying.
  - aid: cdata:log-api
    name: CData Log API
    tags:
      - Audit
      - Logs
      - Observability
    humanURL: https://cloud.cdata.com/docs/Log-API.html
    properties:
      - url: https://cloud.cdata.com/docs/Log-API.html
        type: Documentation
    description: >-
      The CData Cloud Log API retrieves operational logs for queries,
      jobs, and connection events, enabling observability of the CData
      Connect Cloud service.
  - aid: cdata:connection-api
    name: CData Connection API
    tags:
      - Administration
      - Connections
      - Data Sources
    humanURL: https://cloud.cdata.com/docs/Connection-API.html
    properties:
      - url: https://cloud.cdata.com/docs/Connection-API.html
        type: Documentation
    description: >-
      The CData Cloud Connection API manages data source connections
      programmatically, allowing administrators to create, update, test,
      and delete connections to databases and SaaS applications.
  - aid: cdata:job-api
    name: CData Job API
    tags:
      - Background Jobs
      - Monitoring
      - Replication
    humanURL: https://cloud.cdata.com/docs/Job-API.html
    properties:
      - url: https://cloud.cdata.com/docs/Job-API.html
        type: Documentation
    description: >-
      The CData Cloud Job API monitors background jobs such as
      replication, caching, and scheduled operations, exposing job state
      and history.
  - aid: cdata:account-api
    name: CData Account API
    tags:
      - Account Management
      - Administration
      - Users
    humanURL: https://cloud.cdata.com/docs/Account-API.html
    properties:
      - url: https://cloud.cdata.com/docs/Account-API.html
        type: Documentation
    description: >-
      The CData Cloud Account API manages account settings, workspaces,
      and user-level configuration for the CData Connect Cloud tenant.
  - aid: cdata:audit-api
    name: CData Audit API
    tags:
      - Audit
      - Compliance
      - Security
    humanURL: https://cloud.cdata.com/docs/Audit-API.html
    properties:
      - url: https://cloud.cdata.com/docs/Audit-API.html
        type: Documentation
    description: >-
      The CData Cloud Audit API tracks system activities and
      administrative events, supporting compliance and security
      monitoring requirements such as SOC 2 and GDPR.
  - aid: cdata:odata-api
    name: CData OData API
    tags:
      - Data Access
      - OData
      - REST
    humanURL: https://cloud.cdata.com/docs/OData.html
    properties:
      - url: https://cloud.cdata.com/docs/OData.html
        type: Documentation
      - url: https://www.odata.org/documentation/
        type: Specification
    description: >-
      CData Connect Cloud exposes an OData v4 compatible API that allows
      any OData client to browse metadata and query data from any
      configured source, including Excel, Power BI, and other BI tools.
